<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clube da Cana FC</title>
<link rel="icon" href="logo.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="dark-mode">

<!-- ======================= TELA DE LOGIN ======================= -->
<div id="screen-login" class="screen screen-login active">
  <div class="login-bg-fx"></div>
  <div class="login-card fade-in-up">
    <img src="logo.png" alt="Clube da Cana FC" class="login-logo">
    <h1 class="club-name">Clube da Cana <span>FC</span></h1>
    <p class="club-tagline">Paixão, garra e tradição em campo</p>

    <div id="login-select" class="login-actions">
      <button class="btn btn-primary btn-block" id="btn-goto-admin">
        Entrar como Administrador
      </button>
      <button class="btn btn-outline btn-block" id="btn-goto-player">
        Entrar como Jogador
      </button>
    </div>

    <form id="login-form" class="login-form hidden">
      <h3 id="login-form-title">Login</h3>
      <div class="field">
        <label>Usuário</label>
        <input type="text" id="login-user" autocomplete="username" required>
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="login-pass" autocomplete="current-password" required>
      </div>
      <p class="login-error hidden" id="login-error">Usuário ou senha inválidos.</p>
      <div class="login-form-actions">
        <button type="button" class="btn btn-ghost" id="btn-login-back">Voltar</button>
        <button type="submit" class="btn btn-primary">Entrar</button>
      </div>
    </form>
  </div>
  <div class="login-footer">© 2026 Clube da Cana FC — Todos os direitos reservados</div>
</div>

<!-- ======================= APP SHELL (ADMIN / JOGADOR) ======================= -->
<div id="screen-app" class="screen screen-app">
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <img src="logo.png" alt="logo" class="sidebar-logo">
      <div class="sidebar-title">
        <strong>Clube da Cana</strong>
        <span>FC</span>
      </div>
      <button id="btn-close-sidebar" class="icon-btn sidebar-close-btn"></button>
    </div>
    <nav id="sidebar-nav" class="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <button id="btn-logout" class="btn btn-ghost btn-block"></button>
    </div>
  </aside>

  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <main class="main-area">
    <header class="topbar">
      <button id="btn-menu" class="icon-btn topbar-menu-btn"></button>
      <h2 id="page-title" class="page-title">Dashboard</h2>
      <div class="topbar-right">
        <div class="notif-wrap">
          <button id="btn-notif" class="icon-btn"></button>
          <span id="notif-badge" class="notif-badge hidden">0</span>
          <div id="notif-dropdown" class="notif-dropdown hidden"></div>
        </div>
        <div class="topbar-user">
          <span id="topbar-username">Admin</span>
          <span id="topbar-role" class="badge-role">Administrador</span>
        </div>
      </div>
    </header>
    <section id="view-content" class="view-content"></section>
  </main>
</div>

<!-- ======================= MODAL GENÉRICO ======================= -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div id="modal-box" class="modal-box"></div>
</div>

<!-- ======================= TOAST ======================= -->
<div id="toast-container" class="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="js/icons.js"></script>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/charts.js"></script>
<script src="js/views.js"></script>
<script src="js/modals.js"></script>
<script src="js/app.js"></script>
</body>
</html>
